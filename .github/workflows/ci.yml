name: HotelIQ CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --workspaces --if-present

      - name: Run build
        run: npm run build --workspaces --if-present

      - name: Check for build artifacts
        run: |
          test -d apps/api/dist || (echo "API build failed" && exit 1)
          test -d apps/web/.next || (echo "Web build failed" && exit 1)
          test -d packages/observability/dist || (echo "Observability build failed" && exit 1)
          test -d packages/agents/dist || (echo "Agents build failed" && exit 1)
          test -d packages/pipelines/dist || (echo "Pipelines build failed" && exit 1)

  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hoteliq_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hoteliq_test

      - name: Run tests
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hoteliq_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high

      - name: Check for known vulnerabilities
        run: npx audit-ci --config .audit-ci.json

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-build, test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        run: |
          docker build -t hoteliq-api:latest apps/api/
          
      - name: Build Web Docker image  
        run: |
          docker build -t hoteliq-web:latest apps/web/

      - name: Test Docker containers
        run: |
          docker-compose -f infra/docker-compose.yml config
          
  performance:
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build --workspaces --if-present

      - name: Check bundle size
        run: |
          cd apps/web
          npm run build
          npx next-bundle-analyzer --no-open
